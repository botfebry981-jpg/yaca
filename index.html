<!DOCTYPE html>
<html>
<head>
  <title>Yaca - Lowongan Kerja</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      margin: 0;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      margin: 10px auto;
      padding: 15px;
      width: 90%;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>YACA</h1>
  <p>Lowongan Kerja Terbaru</p>
</header>

<div class="container">

  <div class="card">
    <h3>Admin Toko</h3>
    <p>Lokasi: Kendari</p>
    <button>Lihat Detail</button>
  </div>

  <div class="card">
    <h3>Kasir</h3>
    <p>Lokasi: Kendari</p>
    <button>Lihat Detail</button>
  </div>

</div>

</body>
</html>
