<!DOCTYPE html>

      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #34495e;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;

      font-weight: bold;
    }

    .container {

    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn {
      background: #27ae60;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }

</head>

<body>

<header>

<nav>
  <a href="#">Home</a>

</nav>

  <div class="card">

</html>
